server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    add_header X-Content-Type-Options "nosniff" always;
    # frame-ancestors instead of X-Frame-Options: Telegram Web runs the TMA in an iframe
    add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SSE streams: no buffering, allow long-lived connections
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # TZ-090: nothing here previously set Cache-Control, so every static
    # asset — including Vite's content-hashed JS/CSS — fell back to browser
    # heuristic caching (Lighthouse's "inefficient cache lifetimes" finding).
    # /assets/ filenames are content-hashed by the build, so a change always
    # ships under a new filename — a 1-year immutable cache is safe.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # The service worker file itself must always be revalidated, or updates
    # never reach clients that already registered an old one.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
    }

    # Everything else static (favicon, manifest, tarot card art, icons) is
    # unhashed but rarely changes — a moderate cache still removes most of
    # the Lighthouse penalty without risking a long-lived stale asset.
    location ~* \.(?:jpg|jpeg|png|gif|webp|svg|woff2?|ico|json)$ {
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        # index.html references the hashed asset filenames, so it must
        # always be revalidated — never served stale out of a cache.
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
