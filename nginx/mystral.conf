# Reference config for main VPS nginx (SweetSin's nginx)
# Add this file to /etc/nginx/sites-available/mystral.conf
# then: ln -s /etc/nginx/sites-available/mystral.conf /etc/nginx/sites-enabled/
# then: sudo certbot --nginx -d mystral.app -d www.mystral.app
# then: sudo nginx -s reload

server {
    listen 80;
    server_name mystral.app www.mystral.app;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
