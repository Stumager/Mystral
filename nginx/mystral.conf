# Reference config for the HOST-level VPS nginx ("SweetSin's nginx" — runs
# directly on the VPS OS at /etc/nginx/sites-available/mystral, outside
# docker-compose entirely). This is NOT the "nginx" service in
# docker-compose.prod.yml (nginx.prod.conf) — that one only listens on
# 127.0.0.1:8080 internally and has no TLS/domain awareness. This file owns
# mystral.space's TLS termination and domain routing; edit it directly on
# the VPS and reload with `sudo nginx -t && sudo systemctl reload nginx`
# (never a docker command) for any change here to take effect.
#
# This is an exact copy of the file applied on prod for TZ-084
# (2026-07-18), confirmed live: nginx -t clean, apex 200, www -> apex 301,
# spoofed SNI on 443 rejected at the TLS handshake, both http variants
# redirect to the apex. Keep this file in sync with the real one going
# forward — diff before reapplying if the two have drifted.
#
# TZ-084 root cause (for context, not acted on again here): the original
# 443 block put both mystral.space and www.mystral.space in one
# server_name, so both proxied straight to the app — no www->apex redirect
# existed on 443 at all. The 80 block used `return 301 https://$host...`,
# which redirects each host to itself instead of the canonical apex. No
# block anywhere claimed default_server on 443, so the mystral block (the
# only one listening on 443 in this file) became the implicit default —
# meaning ANY SNI/Host reaching this server on 443 got the live app,
# confirmed by requesting with a spoofed, unrelated hostname and getting
# back the identical app response.
#
# mystral.app / www.mystral.app: intentionally not in this file. Confirmed
# via two independent DNS resolvers (system default + Google
# DNS-over-HTTPS) that mystral.app is NXDOMAIN at the .app TLD level — not
# registered, or has no nameservers. Nothing nginx-side can act on it until
# it's registered and its A record points at this server; add its blocks
# (http redirect now, https block via `sudo certbot --nginx -d mystral.app
# -d www.mystral.app` once DNS resolves) as a separate follow-up then.
#
# Checked before adding the default_server block below: neither
# /etc/nginx/sites-available/default (default_server claimed only on port
# 80; its port-443 section is commented out) nor
# /etc/nginx/sites-available/trackergym (listens on 443 without
# default_server) claims default_server on 443 — confirmed no conflict.
# Also note neither of the VPS's existing 443 blocks (this file's original,
# and trackergym's) binds `[::]:443` — IPv6 wasn't in use for HTTPS here,
# so the catch-all below stays IPv4-only for consistency with what's
# actually proven to work on this host, rather than introduce an untested
# bind.

server {
        server_name mystral.space;
        location / {
                proxy_pass http://localhost:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
        }
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mystral.space/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mystral.space/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
        server_name www.mystral.space;
        listen 443 ssl; # managed by Certbot
        ssl_certificate /etc/letsencrypt/live/mystral.space/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/mystral.space/privkey.pem; # managed by Certbot
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
        return 301 https://mystral.space$request_uri;
}

server {
        listen 443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
}

server {
        listen 80;
        server_name mystral.space www.mystral.space;
    return 301 https://mystral.space$request_uri; # managed by Certbot
}
