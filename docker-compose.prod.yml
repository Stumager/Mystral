version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mystral
      POSTGRES_USER: mystral
      POSTGRES_PASSWORD: mystral123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mystral-net
    restart: always

  redis:
    image: redis:7-alpine
    networks:
      - mystral-net
    restart: always

  backend:
    build: ./backend
    env_file: .env.prod
    depends_on:
      - postgres
      - redis
    networks:
      - mystral-net
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - ./frontend/public/tarot:/usr/share/nginx/html/tarot:ro
    networks:
      - mystral-net
    restart: always

  bot:
    build: ./bot
    env_file: .env.prod
    depends_on:
      - backend
    networks:
      - mystral-net
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - mystral-net
    restart: always

volumes:
  postgres_data:

networks:
  mystral-net:
    driver: bridge
