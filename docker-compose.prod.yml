services:
  backend:
    build: ./backend
    restart: always
    env_file: .env.prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - mystral_net
      - shared_infra
    depends_on:
      - nginx

  bot:
    build: ./bot
    restart: always
    env_file: .env.prod
    networks:
      - mystral_net
      - shared_infra

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    networks:
      - mystral_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mystral_net

networks:
  mystral_net:
    driver: bridge
  shared_infra:
    external: true
    # Run `docker network ls` on VPS to find SweetSin's network name and update here
    name: sweetsin_default

volumes: {}
