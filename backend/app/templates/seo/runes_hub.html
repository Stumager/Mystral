{% extends "seo/base.html" %}
{% block schema %}
<script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"{{ t.bc_home }}","item":"https://mystral.space"},{"@type":"ListItem","position":2,"name":"{{ t.bc_runes }}","item":"{{ canonical }}"}]}</script>
{% endblock %}
{% block breadcrumbs %}<a href="/">{{ t.bc_home }}</a> › {{ t.bc_runes }}{% endblock %}
{% block content %}
<h1>{{ t.runes_hub_h1 }}</h1>
<p>{{ t.runes_hub_intro }}</p>
<div class="links" style="margin-top:24px">{% for r in runes %}<a href="{{ prefix }}/runes/{{ r.slug }}" style="text-align:center;padding:18px"><span style="display:block;font-size:32px;color:#A99BE0">{{ r.symbol }}</span><span style="font-family:'Cormorant Garamond',serif;font-size:18px;color:#F0E9DA">{{ r.name }}</span></a>{% endfor %}</div>
{% endblock %}
