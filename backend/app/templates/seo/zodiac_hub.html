{% extends "seo/base.html" %}
{% block schema %}
<script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"{{ t.bc_home }}","item":"https://mystral.space"},{"@type":"ListItem","position":2,"name":"{{ t.bc_zodiac }}","item":"{{ canonical }}"}]}</script>
{% endblock %}
{% block breadcrumbs %}<a href="/">{{ t.bc_home }}</a> › {{ t.bc_zodiac }}{% endblock %}
{% block content %}
<h1>{{ t.zodiac_hub_h1 }}</h1>
<p>{{ t.zodiac_hub_intro }}</p>
<div class="links" style="margin-top:24px">{% for s in signs %}<a href="{{ prefix }}/zodiac/{{ s.slug }}" style="padding:18px;text-align:center"><span style="display:block;font-family:'Cormorant Garamond',serif;font-size:22px;color:#F0E9DA">{{ s.name }}</span><span style="font-size:11px;color:#8A8170">{{ s.dates }}</span></a>{% endfor %}</div>
{% endblock %}
